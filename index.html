<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Mate</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Memory Mate</h1>
        <p>Your Personal Memory Assistant</p>
    </header>
    <main>
        <section class="add-section">
            <input type="text" id="question-input" 
                placeholder="Enter Your Question..." autocomplete="off">
            <input type="text" id="answer-input" 
                placeholder="Enter Your Answer" autocomplete="off">
            <button id="add-btn">Add Card</button>
        </section>

        <section class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="known">Known</button>
            <button class="filter-btn" data-filter="review">Review</button>
        </section>
        <section class="stats-section">
            <span id="total-count">Total: 0</span>
            <span id="known-count">Known: 0</span>
            <span id="review-count">Review: 0</span>
        </section>
        <section class="cards-grid" id="cards-container">
            <p class="empty-msg" id="empty-msg">
                No cards available. Add a new card to get started!
            </p>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
